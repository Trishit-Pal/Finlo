version: "3.9"

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: financecoach_postgres
    environment:
      POSTGRES_USER: financecoach
      POSTGRES_PASSWORD: financecoach
      POSTGRES_DB: financecoach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financecoach"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: financecoach_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: financecoach_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket creation (run once)
  minio-init:
    image: minio/mc:latest
    container_name: financecoach_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/finance-receipts &&
        mc policy set private local/finance-receipts &&
        echo 'MinIO bucket initialized'
      "

  backend:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    container_name: financecoach_backend
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://financecoach:financecoach@postgres:5432/financecoach
      REDIS_URL: redis://redis:6379/0
      STORAGE_ENDPOINT: http://minio:9000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    container_name: financecoach_worker
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://financecoach:financecoach@postgres:5432/financecoach
      REDIS_URL: redis://redis:6379/0
      STORAGE_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: python -m rq worker --url redis://redis:6379/0

volumes:
  postgres_data:
  redis_data:
  minio_data:
